spring.application.name=api

# 1. Porta
server.port=${PORT:8080}

# 2. Configurações de SMTP (Brevo)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=b01894001@smtp-brevo.com
spring.mail.password=${SMTP_PASSWORD}

# 3. Protocolos de segurança
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Remova a linha 'spring.mail.properties.mail.smtp.starttls.required=true'
# pois ela pode causar conflito em alguns relés SMTP.

# Aumentamos o tempo limite para 10 segundos para evitar o erro de 'Connect timed out'
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

